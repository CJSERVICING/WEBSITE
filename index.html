<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Website</title>
    <script>
      console.log('[CJ] HTML loaded, scripts beginning to load...');
      window.__appStartTime = Date.now();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Fallback if modules don't load after 5 seconds
      setTimeout(() => {
        if (!window.__appStarted) {
          console.error('[CJ] App did not start after 5 seconds - likely script loading issue');
          const root = document.getElementById('root');
          if (root && root.innerHTML.trim() === '') {
            root.innerHTML = '<div style="padding: 40px; text-align: center; font-family: system-ui;"><h2>Connection Issue</h2><p>The application scripts failed to load. This is usually a Cloudflare or network issue.</p><button onclick="location.reload()" style="padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">Reload Page</button></div>';
          }
        }
      }, 5000);
    </script>
  </body>
</html>
