compatibility_date = "2024-12-16"

name = "website"
type = "javascript"

main = "dist/worker.mjs"

[build]
command = "npm run build"
cwd = "./"
watch_paths = ["src/**/*.tsx", "src/**/*.ts", "public/**/*", "index.html"]

[env.production]
vars = { ENVIRONMENT = "production" }

[[routes]]
pattern = "/*"
zone_name = "cjservicing.co.uk"
